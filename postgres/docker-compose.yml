version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: devops-sa        # Change to your desired username
      POSTGRES_PASSWORD: QAZ123_wsx # Change to a strong password
      POSTGRES_DB: devops      # Initial database name
    ports:
      - "5432:5432"                # Host:Container port mapping
    healthcheck:
      test: [ "CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER:-postgres}" -d "$${POSTGRES_DB:-postgres}" -h localhost || exit 1' ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    stop_grace_period: 120s
    volumes:
      - ./data:/var/lib/postgresql/data  # Persistent storage
      # - C:\Users\aadeniyi\Documents\StarRiver\sumo\pythonRefresher\postgres\data:/var/lib/postgresql/data  # Persistent storage



  pgadmin:
    image: dpage/pgadmin4:8
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com  # Login email for pgAdmin
      PGADMIN_DEFAULT_PASSWORD: admin123        # Login password for pgAdmin
    ports:
      - "5050:80"                  # Access pgAdmin at http://localhost:5050
    depends_on:
      - postgres

volumes:
  postgres_data:
    external: true

