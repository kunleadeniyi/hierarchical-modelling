version: '3.9'

# ─── Profiles ────────────────────────────────────────────────────────────────
#
#   (no profile)              postgres only — always starts
#   --profile pgadmin         + pgAdmin web UI  (use if you have no DB IDE)
#   --profile dashboard       + Metabase BI dashboard
#
# Examples:
#   docker compose up -d                                  # DB only
#   docker compose --profile pgadmin up -d               # DB + pgAdmin
#   docker compose --profile dashboard up -d             # DB + Metabase
#   docker compose --profile pgadmin --profile dashboard up -d  # everything
#
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Core database (always starts) ──────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devops_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-devops}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-devops_user}\" -d \"${POSTGRES_DB:-devops}\" -h localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    stop_grace_period: 120s
    volumes:
      - ./data:/var/lib/postgresql/data

  # ── pgAdmin — profile: pgadmin ─────────────────────────────────────────────
  # Web-based Postgres GUI. Use this if you don't have a local DB IDE
  # (DataGrip, DBeaver, TablePlus, etc.).
  # Access at http://localhost:5050
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: pgadmin
    profiles: [pgadmin]
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # ── Metabase — profile: dashboard ─────────────────────────────────────────
  # BI dashboard. Connect it to postgres_db on first launch (see README).
  # Access at http://localhost:3000
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    profiles: [dashboard]
    restart: unless-stopped
    environment:
      MB_DB_TYPE: h2                        # embedded H2 for Metabase's own metadata
      JAVA_TIMEZONE: UTC
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - metabase_data:/metabase-data

volumes:
  metabase_data:
